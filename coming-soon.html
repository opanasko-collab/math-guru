<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Скоро | Студія Математичних Гуру</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #F5C518;
    --blue: #1A5FBF;
    --blue-dark: #0D3A7A;
    --blue-light: #4A90D9;
    --white: #FFFFFF;
    --gray: #F7F7F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--blue-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(245,197,24,0.1) 0%, transparent 70%);
  }

  .math-symbols {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .math-symbols span {
    position: absolute;
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1.2rem, 3vw, 2.5rem);
    color: rgba(245,197,24,0.08);
    animation: floatUp 14s infinite linear;
    font-weight: 900;
  }
  .math-symbols span:nth-child(1) { left: 8%; animation-delay: 0s; }
  .math-symbols span:nth-child(2) { left: 25%; animation-delay: 3s; }
  .math-symbols span:nth-child(3) { left: 55%; animation-delay: 6s; }
  .math-symbols span:nth-child(4) { left: 75%; animation-delay: 1.5s; }
  .math-symbols span:nth-child(5) { left: 90%; animation-delay: 9s; }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 2;
    max-width: 560px;
  }

  .badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--blue-dark);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 100px;
    margin-bottom: 32px;
    animation: fadeDown 0.7s ease both;
  }

  .icon {
    font-size: 5rem;
    margin-bottom: 24px;
    display: block;
    animation: fadeDown 0.8s ease both;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 20px;
    animation: fadeDown 0.9s ease both;
  }

  h1 span { color: var(--yellow); }

  p {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.7);
    line-height: 1.8;
    margin-bottom: 40px;
    animation: fadeDown 1s ease both;
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--yellow);
    color: var(--blue-dark);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeDown 1.1s ease both;
  }

  .btn-back:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(245,197,24,0.35);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="glow"></div>
<div class="math-symbols">
  <span>∑</span><span>π</span><span>∞</span><span>√</span><span>🚀</span>
</div>

<div class="content">
  <div class="badge">✦ Студія Математичних Гуру</div>
  <span class="icon">🚧</span>
  <h1>Курс поки що<br><span>в розробці</span></h1>
  <p>Я працюю над чимось особливим для тебе. Незабаром тут з'явиться повноцінний курс — слідкуй за оновленнями в Instagram.</p>
  <a href="index.html" class="btn-back">← Повернутися на головну</a>
</div>

</body>
</html>
